name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build & verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '11'
          cache: maven

      - name: Compile
        run: mvn -B -ntp compile

      - name: Offline tests (no daemon)
        # Runs the test suite without a daemon; the live tests self-skip and the
        # offline in-process tests run normally.
        run: mvn -B -ntp test

  live:
    # Boots a real mongreldb-server and runs the live round-trip suite.
    name: Live integration (against mongreldb-server)
    runs-on: ubuntu-latest
    env:
      SERVER_VERSION: '0.53.3'
      MONGRELDB_URL: http://127.0.0.1:8453
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '11'
          cache: maven

      - name: Compile
        run: mvn -B -ntp compile

      - name: Cache mongreldb-server binary
        id: server-cache
        uses: actions/cache@v6
        with:
          path: bin/mongreldb-server
          key: mongreldb-server-linux-x64-${{ env.SERVER_VERSION }}

      - name: Download mongreldb-server
        if: steps.server-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p bin
          curl -fsSL -o bin/mongreldb-server \
            "https://github.com/visorcraft/MongrelDB/releases/download/v${SERVER_VERSION}/mongreldb-server-linux-x64"
          chmod +x bin/mongreldb-server
          ./bin/mongreldb-server --help | head -n 1

      - name: Start mongreldb-server
        run: |
          rm -rf /tmp/mongreldb-data
          ./bin/mongreldb-server /tmp/mongreldb-data --port 8453 > /tmp/mongreldb-server.log 2>&1 &
          echo $! > /tmp/mongreldb-server.pid
          # Wait for the daemon to become healthy (max ~30s).
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8453/health >/dev/null 2>&1; then
              echo "mongreldb-server is healthy"
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:8453/health >/dev/null || (cat /tmp/mongreldb-server.log && exit 1)

      - name: Run live tests
        run: mvn -B -ntp test

      - name: Run examples
        run: |
          mkdir -p /tmp/ex-classes
          find examples -name "*.java" -print0 | xargs -0 javac -cp target/classes -d /tmp/ex-classes
          for cls in com.example.BasicCrud com.example.QueryBuilderExample com.example.TransactionsExample; do
            echo "=== Running $cls ==="
            java -cp "target/classes:/tmp/ex-classes" "$cls" || { echo "FAILED: $cls"; exit 1; }
          done

      - name: Dump server log on failure
        if: failure()
        run: cat /tmp/mongreldb-server.log

      - name: Stop mongreldb-server
        if: always()
        run: |
          if [ -f /tmp/mongreldb-server.pid ]; then
            kill "$(cat /tmp/mongreldb-server.pid)" 2>/dev/null || true
          fi

  native:
    # Tests the JNI embedded mode against the prebuilt libmongreldb_jni.
    name: Native embedding (JNI)
    runs-on: ubuntu-latest
    env:
      SERVER_VERSION: '0.53.3'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Download JNI library
        run: |
          mkdir -p native-libs
          curl -fsSL -o /tmp/jni.jar \
            "https://github.com/visorcraft/MongrelDB/releases/download/v${SERVER_VERSION}/mongreldb-jni-${SERVER_VERSION}-linux-x64.jar"
          # Extract the native lib from the JAR
          unzip -j /tmp/jni.jar "native/linux/x64/*" -d native-libs
          ls -la native-libs/

      - name: Build
        run: mvn -B -ntp compile test-compile

      - name: Run native tests
        run: |
          mvn -B -ntp test \
            -DargLine="-Djava.library.path=$(pwd)/native-libs" \
            -Dtest=NativeDBTest

      - name: Run native example
        run: |
          mkdir -p /tmp/ex-classes
          find examples -name "*.java" -print0 | xargs -0 javac -cp target/classes -d /tmp/ex-classes
          MONGRELDB_NATIVE_DIR="$(pwd)/native-libs" \
          java -cp "target/classes:/tmp/ex-classes" com.example.NativeBasicCrud
