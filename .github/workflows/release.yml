# Publishes mongreldb-java to Maven Central on a `v*` tag push.
#
# The release profile (defined in pom.xml) attaches sources + javadoc,
# GPG-signs all artifacts, and uploads via the central-publishing-maven-plugin
# (the Central Publishing Portal; OSSRH was sunset in 2025).
#
# Required secrets (configure in repo settings → Secrets and variables → Actions):
#   CENTRAL_USERNAME  - Central Portal token username
#   CENTRAL_PASSWORD  - Central Portal token password
#   GPG_PRIVATE_KEY   - ASCII-armored GPG signing key (export --armor --export-secret-keys)
#   GPG_KEY_ID        - Key ID (e.g. ABCDEF1234567890)
#   GPG_PASSPHRASE    - Passphrase protecting the GPG key

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 11

      - name: Import GPG signing key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --dearmor --output /tmp/signing.gpg
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          gpg --batch --import /tmp/signing.gpg
          echo -e "5\ny\n" | gpg --batch --command-fd 0 --expert --edit-key ${{ secrets.GPG_KEY_ID }} trust

      - name: Configure Maven settings.xml
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'XML'
          <settings>
            <servers>
              <server>
                <id>central</id>
                <username>${env.CENTRAL_USERNAME}</username>
                <password>${env.CENTRAL_PASSWORD}</password>
              </server>
            </servers>
          </settings>
          XML

      - name: Deploy to Maven Central
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
        run: |
          mvn -B -ntp -Prelease deploy \
            -Dgpg.keyname=${{ secrets.GPG_KEY_ID }} \
            -Dgpg.passphrase=${{ secrets.GPG_PASSPHRASE }}
